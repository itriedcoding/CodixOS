# CodixOS GRUB Configuration

set default=0
set timeout=5
set color_normal=white/black
set color_highlight=green/black

menuentry "CodixOS" {
    set root=(hd0,msdos1)
    linux /boot/codixos.bin root=/dev/sda1 ro quiet splash
    initrd /boot/initrd.img
}

menuentry "CodixOS (Recovery)" {
    set root=(hd0,msdos1)
    linux /boot/codixos.bin root=/dev/sda1 ro single
    initrd /boot/initrd.img
}

menuentry "CodixOS (Live)" {
    set root=(hd0,msdos1)
    linux /boot/codixos.bin root=/dev/ram0 ro quiet splash
    initrd /boot/initrd.img
}

menuentry "Memory Test (memtest86+)" {
    linux16 /boot/memtest86+.bin
}
