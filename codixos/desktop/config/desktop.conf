# CodixOS Desktop Environment Configuration

[General]
Theme=catppuccin-mocha
IconTheme=codixos
FontName=Ubuntu
FontSize=11
DoubleClickTime=400
CursorSize=24

[WindowManager]
Compositor=enabled
Animations=enabled
AnimationSpeed=normal
TitleBarHeight=32
BorderWidth=2
ButtonLayout=close,minimize,maximize

[Panel]
Position=bottom
Height=36
AutoHide=false
AlwaysOnTop=true
ShowClock=true
ShowSystemTray=true
ShowTaskbar=true
ClockFormat=%H:%M
DateFormat=%a %b %d

[Desktop]
ShowIcons=true
IconSize=64
IconArrangement=auto
WallpaperMode=fill
WallpaperPath=/usr/share/codixos/wallpapers/default.png

[Theme]
BackgroundColor=#1e1e2e
PanelColor=#313244
TextColor=#cdd6f4
AccentColor=#89b4fa
HighlightColor=#45475a

[Shortcuts]
Super=OpenAppLauncher
Super+D=ShowDesktop
Super+E=OpenFileManager
Super+T=OpenTerminal
Super+L=LockScreen
Alt+Tab=SwitchWindows
Alt+F4=CloseWindow
Ctrl+Alt+Delete=TaskManager

[Apps]
DefaultTerminal=codix-term-gui
DefaultFileManager=codix-files
DefaultEditor=codix-editor
DefaultBrowser=codix-browser
DefaultCalculator=codix-calc

[Font]
MonospaceFont=Ubuntu Mono
MonospaceSize=12
SansFont=Ubuntu
SansSize=11
SerifFont=Ubuntu Serif
SerifSize=11

[Display]
Resolution=auto
RefreshRate=auto
MultiMonitor=enabled
PrimaryMonitor=0
