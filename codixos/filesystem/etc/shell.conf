# CodixOS Shell Configuration

# Shell settings
SHELL_VERSION=1.0.0
SHELL_NAME=codix-sh
SHELL_PROMPT="\u@\h:\w\$ "
SHELL_HISTORY_SIZE=1000
SHELL_HISTORY_FILE=~/.codix-sh_history

# Colors
COLOR_RESET="\033[0m"
COLOR_RED="\033[31m"
COLOR_GREEN="\033[32m"
COLOR_YELLOW="\033[33m"
COLOR_BLUE="\033[34m"
COLOR_MAGENTA="\033[35m"
COLOR_CYAN="\033[36m"
COLOR_WHITE="\033[37m"
COLOR_BOLD="\033[1m"

# Aliases
alias ls='ls --color=auto'
alias ll='ls -la'
alias la='ls -A'
alias l='ls -CF'
alias grep='grep --color=auto'
alias fgrep='fgrep --color=auto'
alias egrep='egrep --color=auto'

# Environment variables
export EDITOR=vim
export PAGER=less
export LANG=en_US.UTF-8
export PATH=/usr/local/bin:/usr/bin:/bin:/opt/codixos/bin

# Custom prompt
set_prompt() {
    if [ "$(id -u)" -eq 0 ]; then
        PS1="\[\033[31m\]\u\[\033[0m\]@\[\033[36m\]\h\[\033[0m\]:\[\033[33m\]\w\[\033[0m\]# "
    else
        PS1="\[\033[32m\]\u\[\033[0m\]@\[\033[36m\]\h\[\033[0m\]:\[\033[33m\]\w\[\033[0m\]$ "
    fi
}

# Welcome message
welcome_message() {
    echo ""
    echo -e "\033[36m\033[1m        _____      _               ____   _____ \033[0m"
    echo -e "\033[36m\033[1m       / ____|    | |             |  _ \ / ____|\033[0m"
    echo -e "\033[36m\033[1m      | |     ___ | | ___  _ __   | |_) | (___  \033[0m"
    echo -e "\033[36m\033[1m      | |    / _ \| |/ _ \| '__|  |  _ < \___ \ \033[0m"
    echo -e "\033[36m\033[1m      | |___| (_) | | (_) | |     | |_) |____) |\033[0m"
    echo -e "\033[36m\033[1m       \_____\___/|_|\___/|_|     |____/|_____/ \033[0m"
    echo ""
    echo -e "\033[32m  Welcome to CodixOS Shell v$SHELL_VERSION\033[0m"
    echo -e "\033[33m  Type 'help' for available commands\033[0m"
    echo ""
}
